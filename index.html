<script>

  !function(f,b,e,v,n,t,s)

  /* ── Purchase guard ── */
  /* DEFAULT = false = ALL Purchase events blocked until explicitly unlocked */

  var _purchaseAllowed = false;

  /* Called by CheckOut.jsx → trackPurchase() to allow exactly ONE real purchase through */
  window.__allowNextPurchase = function() {
    _purchaseAllowed = true;
  };

  /* Wraps fbq to intercept and block unauthorized Purchase events */
  function purchaseFilter(dispatchFn) {
    return function(...args) {
      var isTrack      = (args[0] === 'track'    && args[1] === 'Purchase');
      var isCallMethod = (args[0] === 'Purchase');
      if (isTrack || isCallMethod) {
        if (!_purchaseAllowed) {
          console.warn('[Ilika] Purchase blocked');
          return;
        }
        _purchaseAllowed = false; /* reset — only one fires per unlock */
      }
      return dispatchFn.apply(this, args);
    };
  }

  /* Build the fbq stub */
  var fbqStub = function() {
    fbqStub.callMethod
      ? fbqStub.callMethod.apply(fbqStub, arguments)
      : fbqStub.queue.push(arguments);
  };
  fbqStub.push    = fbqStub;
  fbqStub.loaded  = true;
  fbqStub.version = '2.0';
  fbqStub.queue   = [];

  /* Wrap the stub with the purchase filter BEFORE assigning to window.fbq */
  window.fbq  = purchaseFilter(fbqStub);
  window._fbq = fbqStub;

  /* Standard pixel init — PageView only, NO Purchase here */
  fbq('init', '1188302548683614');
  fbq('track', 'PageView');
</script>
