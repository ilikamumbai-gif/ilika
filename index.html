  <!-- ===== Meta In-App Browser Redirect ===== -->
  <!-- Forces Instagram / Facebook in-app browser to open in Chrome or Safari -->
  <script>
    (function () {
      var ua = navigator.userAgent || '';

      // Detect Meta / Facebook / Instagram in-app browsers
      var isInstagram = ua.indexOf('Instagram') > -1;
      var isFacebook  = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1 || ua.indexOf('FB_IAB') > -1;

      if (!isInstagram && !isFacebook) return; // Not a Meta in-app browser — do nothing

      var url = window.location.href;

      // ---- Android: intent:// scheme forces Chrome ----
      var isAndroid = /Android/i.test(ua);
      if (isAndroid) {
        // Strip the protocol so we can build the intent URI
        var stripped = url.replace(/^https?:\/\//, '');
        var intentUrl =
          'intent://' + stripped +
          '#Intent;scheme=https;package=com.android.chrome;end';
        window.location.replace(intentUrl);
        return;
      }

      // ---- iOS: window.open trick to break out of in-app browser ----
      // On iOS we cannot use intent://, but opening with _blank and then
      // replacing location works for most cases.  We also add ?openExternalBrowser=1
      // which triggers a special handler in some apps.
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      if (isIOS) {
        // Some newer Instagram / TikTok builds respect this query param
        var sep = url.indexOf('?') === -1 ? '?' : '&';
        window.location.replace(url + sep + 'openExternalBrowser=1');
        return;
      }
    })();
  </script>
  <!-- ===== End Meta In-App Browser Redirect ===== -->

  <!-- Google Tag Manager (lazy load to protect first paint) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function loadScriptOnce(src) {
      var existing = document.querySelector('script[src="' + src + '"]');
      if (existing) return;
      var s = document.createElement("script");
      s.async = true;
      s.src = src;
      document.head.appendChild(s);
    }

    function runAfterEngagement(fn) {
      var done = false;
      var run = function () {
        if (done) return;
        done = true;
        window.removeEventListener("pointerdown", run);
        window.removeEventListener("keydown", run);
        window.removeEventListener("scroll", run);
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(fn, { timeout: 5000 });
        } else {
          setTimeout(fn, 2500);
        }
      };

      window.addEventListener("pointerdown", run, { once: true, passive: true });
      window.addEventListener("keydown", run, { once: true });
      window.addEventListener("scroll", run, { once: true, passive: true });

      window.setTimeout(run, 12000);
    }

    runAfterEngagement(function () {
      window.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
      loadScriptOnce("https://www.googletagmanager.com/gtm.js?id=GTM-P8QRKX5D");
    });
  </script>

  <script>
    var PIXEL_ID = '1188302548683614';
    var _purchaseAllowed = false;

    window.__allowNextPurchase = function() {
      _purchaseAllowed = true;
      setTimeout(function() { _purchaseAllowed = false; }, 5000);
    };

    // The purchase filter — applied to ANY dispatch function
    function purchaseFilter(dispatchFn) {
      return function() {
        var args = Array.prototype.slice.call(arguments);
        // args[0] is the event name when called as callMethod(name, ...)
        // OR args[0]='track', args[1]='Purchase' when called as fbq('track','Purchase')
        var isTrack = (args[0] === 'track' && args[1] === 'Purchase');
        var isCallMethod = (args[0] === 'Purchase'); // callMethod(name, data, options)
        if (isTrack || isCallMethod) {
          if (!_purchaseAllowed) {
            console.warn('[Ilika] Purchase blocked');
            return;
          }
          _purchaseAllowed = false;
        }
        return dispatchFn.apply(this, args);
      };
    }

    // Build the fbq stub
    var fbqStub = function() {
      fbqStub.callMethod
        ? fbqStub.callMethod.apply(fbqStub, arguments)
        : fbqStub.queue.push(arguments);
    };
    fbqStub.push    = fbqStub;
    fbqStub.loaded  = true;
    fbqStub.version = '2.0';
    fbqStub.queue   = [];

    // Use Object.defineProperty to intercept when fbevents.js sets callMethod
    // fbevents.js does: fbq.callMethod = realDispatcher
    // Our setter wraps realDispatcher with purchaseFilter before storing it
    var _realCallMethod = null;
    Object.defineProperty(fbqStub, 'callMethod', {
      get: function() { return _realCallMethod; },
      set: function(fn) {
        // fbevents.js is setting the real dispatcher — wrap it immediately
        _realCallMethod = purchaseFilter(fn);
      },
      configurable: true
    });

    window.fbq  = fbqStub;
    window._fbq = fbqStub;

    // Load fbevents.js after first paint (stub queues events safely)
    runAfterEngagement(function () {
      loadScriptOnce('https://connect.facebook.net/en_US/fbevents.js');
    });

    fbq('init', PIXEL_ID);
    fbq('track', 'PageView');
  </script>
