  <script>
    // ─── STEP 1: Create the fbq stub with Purchase blocker BEFORE fbevents.js loads
    // This runs synchronously — fbevents.js cannot fire anything before this.
    (function() {
      var PIXEL_ID = '1188302548683614';
      var _purchaseAllowed = false;

      // Checkout calls this to authorise exactly one Purchase event
      window.__allowNextPurchase = function() {
        _purchaseAllowed = true;
        setTimeout(function() { _purchaseAllowed = false; }, 5000);
      };

      // Build the fbq queue stub — identical to Meta's standard snippet
      // but with our Purchase filter baked in
      function fbqProxy() {
        var args = Array.prototype.slice.call(arguments);

        // BLOCK any Purchase not authorised by __allowNextPurchase()
        if (args[0] === 'track' && args[1] === 'Purchase') {
          if (!_purchaseAllowed) {
            console.warn('[Ilika] Purchase blocked — not from checkout');
            return;
          }
          _purchaseAllowed = false; // consume — single use only
        }

        // Queue the call (fbevents.js will replay the queue when it loads)
        fbqProxy.queue.push(args);
      }
      fbqProxy.push    = fbqProxy;
      fbqProxy.loaded  = true;
      fbqProxy.version = '2.0';
      fbqProxy.queue   = [];

      window.fbq  = fbqProxy;
      window._fbq = fbqProxy;

      // ─── STEP 2: Load fbevents.js asynchronously
      var t = document.createElement('script');
      t.async = true;
      t.src = 'https://connect.facebook.net/en_US/fbevents.js';
      var s = document.getElementsByTagName('script')[0];
      s.parentNode.insertBefore(t, s);

      // ─── STEP 3: When fbevents.js loads, it replaces window.fbq with the real
      // function and replays queue. We then re-wrap it to keep our Purchase filter.
      t.addEventListener('load', function() {
        var realFbq = window.fbq;
        if (!realFbq || realFbq === fbqProxy || realFbq.__ilika) return;

        window.fbq = function() {
          var args = Array.prototype.slice.call(arguments);
          if (args[0] === 'track' && args[1] === 'Purchase') {
            if (!_purchaseAllowed) {
              console.warn('[Ilika] Purchase blocked — not from checkout');
              return;
            }
            _purchaseAllowed = false;
          }
          return realFbq.apply(this, args);
        };
        // Copy all properties so fbevents.js internals still work
        Object.keys(realFbq).forEach(function(k) {
          try { window.fbq[k] = realFbq[k]; } catch(e) {}
        });
        window.fbq.__ilika = true;
      });

      // ─── STEP 4: Init pixel + fire first PageView
      window.fbq('init', PIXEL_ID);
      window.fbq('track', 'PageView');
    })();
  </script>
